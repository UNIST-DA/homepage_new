# Builds the Next.js static export and publishes it to GitHub Pages.
# Active only when this app sits at the root of its own repo (e.g. homepage_new).
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
  # Commits pushed by the seminar-sync Action use GITHUB_TOKEN, which by design
  # does NOT trigger `push` above. Chain off the sync workflow so new seminars
  # deploy automatically.
  workflow_run:
    workflows: ["Sync seminars from Notion"]
    types: [completed]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    # For sync-triggered runs, only deploy if the sync actually succeeded.
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Project-page URL (username.github.io/homepage_new/). When you later
          # attach the custom domain (served at root), delete these two lines.
          PAGES_BASE_PATH: "/homepage_new"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
